services:
  database:
    image: mongo:latest
    container_name: rz2_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: rz2_backend
    ports:
      - "5001:5001"
    environment:
      - MONGO_URI=mongodb://database:27017/rz2
      - PORT=5001
      - JWT_SECRET=supersecret123
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - database

  frontend:
    build: ./frontend
    container_name: rz2_frontend
    ports:
      - "5174:5174"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  mongo_data: